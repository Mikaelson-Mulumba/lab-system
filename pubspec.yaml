name: powers_clinical_laboratories
description: Your trusted Diaginistic partner
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.7 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2
  flutter_quill: ^11.5.0
  path: ^1.8.0
  cupertino_icons: ^1.0.8
  pdf: ^3.11.3
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  printing: ^5.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4   # ✅ moved here

flutter:
  uses-material-design: true
  assets:
    - assets/images/lab-logo.png
    - assets/lab_tests.json
    - assets/specimens.json
    - assets/urinalysis.json
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf
    - assets/fonts/Roboto-Italic.ttf

# ✅ flutter_launcher_icons configuration
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/lab-logo.png"
  min_sdk_android: 21
